<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio 21 Dias - Marcelo Mendes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
/* BASE */
body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:#FFFFFF;
    background:#000;
    overflow-x:hidden;
}

/* HERO */
.hero{
    position:relative;
    text-align:center;
    padding:120px 20px 100px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(135deg,#000,#111,#222);
}

/* IMAGEM */
.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:1200px;
    height:100%;
    background: url('imagem/TelaPrincipal.png') center/contain no-repeat;
    opacity:0.5;
    z-index:0;
}

/* TEXTO */
.hero h1{
    font-size:56px;
    font-weight:900;
    z-index:1;
    text-shadow:0 0 15px #00FFFF,0 0 25px #FF00FF;
}

.hero p{
    font-style: italic;
    font-size:22px;
    z-index:1;
    color:#EAEAEA;
}

/* BOTÃO */
.btn-custom{
    width: 250px;
    z-index:1;
    background: linear-gradient(135deg,#00FFFF,#FF00FF);
    color:#FFFFFF;
    border:none;
    font-weight: bold;
    border-radius:50px;
    padding:16px 36px;
    box-shadow:0 0 15px #00FFFF,0 0 25px #FF00FF;
    transition:0.3s;
    cursor: pointer;
}

.btn-custom:hover{
    transform:scale(1.05);
}

/* MODAL */
.modal-content{
    background:#111;
    border-radius:20px;
    border:2px solid #00FFFF;
    box-shadow:0 0 10px #00FFFF40;
}

/* INPUTS LOGIN - MAIS VISÍVEIS */
.form-control{
    background:#222;
    border:1px solid #00FFFF;
    color:#EAEAEA;
    padding:12px;
    border-radius:8px;
}

.form-control::placeholder{
    color:#AAA;
}

.form-control:focus{
    outline:none;
    border:1px solid #FF00FF;
    box-shadow:0 0 8px #FF00FF50;
}

/* ALERTA */
#alertMsg{
    display:none;
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:350px;
    background:#FF0040;
    color:#FFFFFF;
    padding:14px;
    border-radius:10px;
    text-align:center;
    z-index:9999;
}

/* ADMIN */
#adminPanel{
    display:none;
    padding:40px 20px;
    max-width:650px;
    margin:auto;
}

.card-box{
    background:#111;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    cursor: pointer;
}

#adminPanel input {
    background:#000;
    color:#FFFFFF;
    border:1px solid #444;
    padding:10px;
    border-radius:8px;
}

#adminPanel input::placeholder {
    color:#aaa;
}

#adminPanel input:focus {
    outline:none;
    border:1px solid #00f0ff;
    box-shadow:0 0 8px #00f0ff50;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero" id="home">
<h1>DESAFIO 21 DIAS</h1>
<p>Transforme seu corpo com método estratégico</p>
<button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#loginModal">Aceitar</button>
</section>

<!-- LOGIN -->
<div class="modal fade" id="loginModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-body">
<input id="user" class="form-control mb-2" placeholder="Login">
<input id="pass" type="password" class="form-control mb-3" placeholder="Senha">
<button class="btn btn-custom w-100" onclick="login()">Entrar</button>
</div>
</div>
</div>
</div>

<!-- ALERTA -->
<div id="alertMsg"></div>

<!-- ADMIN -->
<section id="adminPanel">
<h2 class="text-center mb-3">PAINEL ADMIN</h2>
<input id="novoUser" class="form-control mb-2" placeholder="Login">
<input id="novaPass" class="form-control mb-2" placeholder="Senha">
<input id="novoTel" class="form-control mb-3" placeholder="551999999999">
<button class="btn btn-custom w-100 mb-3" onclick="cadastrar()">Cadastrar</button>
<div id="lista"></div>
</section>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Config Firebase (substitua pelos seus dados)
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_ID",
  appId: "SEU_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// CONFIG ADMIN
const CONFIG = { adminUser:"Desenvolvedor", adminPass:"Taekwondo3028*" };

// UTILS
function get(id){ return document.getElementById(id); }
function safe(v){ return (v||"").trim(); }
function showAlert(msg){ let a=get("alertMsg"); a.innerText=msg; a.style.display="block"; setTimeout(()=>a.style.display="none",3000);}
function limparLogin(){ get("user").value=""; get("pass").value=""; }

// LOGIN
function login(){
    let user=safe(get("user").value), pass=safe(get("pass").value);
    // admin
    if(user===CONFIG.adminUser && pass===CONFIG.adminPass){
        get("home").style.display="none";
        get("adminPanel").style.display="block";
        listarAlunos();
        limparLogin();
        return;
    }
    // usuário
    db.ref('alunos').orderByChild('user').equalTo(user).once('value', snap=>{
        if(!snap.exists()){ showAlert("Usuário não encontrado"); return; }
        snap.forEach(s=>{
            let a=s.val();
            if(a.pass!==pass){ showAlert("Senha incorreta"); }
            else { limparLogin(); window.location.href="treino.html"; }
        });
    });
}

// CADASTRO
function cadastrar(){
    let user=safe(get("novoUser").value),
        pass=safe(get("novaPass").value),
        tel=safe(get("novoTel").value);

    if(!user||!pass||!tel){ showAlert("Preencha todos os campos"); return; }

    db.ref('alunos').orderByChild('user').equalTo(user).once('value', snap=>{
        if(snap.exists()){ showAlert("Usuário já existe"); return; }
        let novoAluno={user,pass,tel};
        let key=db.ref('alunos').push().key;
        let updates={}; updates['/alunos/'+key]=novoAluno;
        db.ref().update(updates);

        let msg=`Olá! Seu login: ${user} Senha: ${pass}`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);

        get("novoUser").value=""; get("novaPass").value=""; get("novoTel").value="";
        listarAlunos();
    });
}

// LISTAR ALUNOS
function listarAlunos(){
    db.ref('alunos').once('value', snap=>{
        let html="";
        snap.forEach(s=>{
            let a=s.val();
            html+=`<div class="card-box">
                <div><strong>${a.user}</strong><br>${a.pass}<br>${a.tel}</div>
                <div>
                    <button onclick="enviar('${s.key}')">Whats</button>
                    <button onclick="remover('${s.key}')">Excluir</button>
                </div>
            </div>`;
        });
        get("lista").innerHTML=html;
    });
}

// WHATS
function enviar(key){ db.ref('alunos/'+key).once('value',s=>{ let a=s.val(); window.open(`https://wa.me/${a.tel}?text=${encodeURIComponent(`Olá! Seu login: ${a.user} Senha: ${a.pass}`)}`); }); }

// REMOVER
function remover(key){ if(confirm("Excluir aluno?")){ db.ref('alunos/'+key).remove(); listarAlunos(); limparLogin(); } }

document.getElementById('loginModal').addEventListener('show.bs.modal', limparLogin);
listarAlunos();
</script>
</body>
</html>
